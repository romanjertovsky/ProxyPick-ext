<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title data-i18n="optionsPageTitle">Proxy Settings</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="options">
  <main>
    <h1 data-i18n="optionsHeading">Proxy List</h1>
    <p class="hint" data-i18n-html="proxyListHintHtml">One proxy per line:<br>http://ip:port<br>http://user:password@ip:port<br>socks4://ip:port<br>socks5://ip:port<br>Authentication is supported only for HTTP proxies.<br>Legacy formats ip:port and ip:port:user:password are treated as HTTP.<br>Use # for comments.</p>
    <textarea
      id="proxyList"
      spellcheck="false"
      data-i18n-placeholder="proxyListPlaceholder"
      placeholder="http://user:password@1.1.1.1:1111 # home&#10;socks5://2.2.2.2:1080 # office&#10;3.3.3.3:8080 # legacy HTTP"></textarea>
    <div class="actions">
      <button id="saveButton" type="button" data-i18n="saveButton">Save</button>
      <span id="status" role="status" aria-live="polite"></span>
    </div>
  </main>
  <script src="i18n.js"></script>
  <script src="options.js"></script>
</body>
</html>
